<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Om Anton</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="stars"></div>

<!-- Halaman Awal -->
<section id="home">

    <div class="card">

        <h3>🎉 Happy Birthday 🎉</h3>

        <h1>Om Anton</h1>

        <p>
            Selamat datang di sebuah ucapan kecil yang dibuat dengan penuh
            rasa hormat dan doa terbaik.
        </p>

        <button id="start">
            🎁 Start
        </button>

    </div>

</section>

<!-- Slideshow -->
<section id="gallery">

    <img src="images/1.jpg" class="slide active">

    <img src="images/2.jpg" class="slide">

</section>

<!-- Ucapan -->
<section id="wish">

    <div class="text-box">

        <h1>💙 Selamat Ulang Tahun 💙</h1>

        <p id="typing"></p>

    </div>

</section>

<!-- Musik -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
